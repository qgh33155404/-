<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真好记忆大师 - 技术支持</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .contact-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-label {
            color: #666;
            font-size: 14px;
        }
        .contact-value {
            color: #333;
            font-weight: 600;
        }
        .email-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .email-link:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        .version {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🃏</div>
        <h1>真好记忆大师</h1>
        <p class="subtitle">棋牌辅助工具 · 出牌记录助手</p>
        
        <div class="contact-card">
            <div class="contact-item">
                <span class="contact-label">📧 邮箱</span>
                <a href="mailto:your@email.com" class="email-link">your@email.com</a>
            </div>
            <div class="contact-item">
                <span class="contact-label">💬 问题反馈</span>
                <span class="contact-value">发送邮件即可</span>
            </div>
            <div class="contact-item">
                <span class="contact-label">⏰ 响应时间</span>
                <span class="contact-value">24小时内</span>
            </div>
        </div>

        <div class="version">v1.0.0</div>

        <div class="footer">
            <p>© 2026 真好记忆大师. 保留所有权利.</p>
            <p style="margin-top: 10px;">
                <a href="#">隐私政策</a> · 
                <a href="#">使用条款</a>
            </p>
        </div>
    </div>
</body>
</html>
